services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: clubapp
      POSTGRES_PASSWORD: clubapp
      POSTGRES_DB: clubapp
    ports:
      - "5432:5432"
    volumes:
      - club_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clubapp -d clubapp"]
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  club_pg_data:
